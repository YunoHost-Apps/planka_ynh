#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "planka"
name = "Planka"
description.en = "Realtime kanban board for workgroups"
description.fr = "Tableau Kanban en temps réel pour les groupes de travail"

version = "2.1.0~ynh1"

maintainers = []

[upstream]
license = "AGPL-3.0"
website = "https://planka.app/"
demo = "https://plankanban.github.io/planka/#/"
admindoc = "https://docs.planka.cloud/docs/intro/"
code = "https://github.com/plankanban/planka"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "arm64", "armhf"]
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "500M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/plankanban/planka/releases/download/v2.1.0/planka-prebuild.zip"
    sha256 = "72c643ef83862f54490dc886d45c89aa5ff5e05d44bd5b87bb7cff4c121c58b3"
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset = "^planka-prebuild.zip$"
    autoupdate.version_regex = "v(\\d+\\.\\d+\\.\\d+)"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    api.url = "/api"
    api.allowed = "visitors"
    api.auth_header = false
    api.show_tile = false
    api.protected = true

    [resources.ports]
    socket.default = 1337
    
    [resources.apt]
    packages = "postgresql, postgresql-contrib, build-essential, python3-venv"

    [resources.database]
    type = "postgresql"

    [resources.nodejs]
    version = "22"
